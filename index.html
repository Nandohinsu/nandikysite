<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>nandiky.com</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ===== CSS ===== -->
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #000;
    overflow: hidden;
    color: #fff;
}

/* ===== Video Background ===== */
#bg-video,
#extra-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    transition: opacity .6s ease;
    will-change: opacity;
}

#bg-video {
    opacity: .7;
}

#extra-video {
    opacity: 0;
    z-index: -1;
}

/* ===== Particles ===== */
#particles-js {
    position: fixed;
    inset: 0;
    z-index: -1;
}

/* ===== Popup ===== */
.popup {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: none;  /* remove blur */
    background: rgba(0, 0, 0, 0.0);
    z-index: 1000;
    transition: opacity 0.5s ease;
}

.popup-content {
    background: rgba(20, 20, 30, 0.85);
    padding: 50px 60px;
    border-radius: 20px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    animation: popupIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes popupIn {
    from { 
        transform: scale(0.8) translateY(20px); 
        opacity: 0; 
    }
    to { 
        transform: scale(1) translateY(0); 
        opacity: 1; 
    }
}

/* ===== OK Button Styles ===== */
.ok-button {
    position: relative;
    padding: 18px 50px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                0 0 20px rgba(102, 126, 234, 0.2) inset;
    min-width: 180px;
    text-transform: uppercase;
}

.ok-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.2), 
                transparent);
    transition: 0.8s;
}

.ok-button:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.2) inset,
                0 0 30px rgba(102, 126, 234, 0.3) inset;
    letter-spacing: 2px;
}

.ok-button:hover::before {
    left: 100%;
}

.ok-button:active {
    transform: translateY(-1px) scale(1.02);
    transition: transform 0.1s;
}

.ok-button .button-text {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.ok-button .button-icon {
    font-size: 20px;
    transition: transform 0.3s ease;
}

.ok-button:hover .button-icon {
    transform: rotate(90deg);
}

/* Button pulse animation */
@keyframes pulse {
    0% {
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4),
                    0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    }
    50% {
        box-shadow: 0 10px 40px rgba(102, 126, 234, 0.6),
                    0 0 0 1px rgba(255, 255, 255, 0.2) inset,
                    0 0 30px rgba(102, 126, 234, 0.3) inset;
    }
    100% {
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4),
                    0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    }
}

.ok-button {
    animation: pulse 3s infinite;
}

/* ===== Music Controls ===== */
.music-controls {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    display: flex;
    gap: 12px;
    opacity: 0;
    transition: opacity .5s ease, transform .5s ease;
}

.music-controls button {
    padding: 10px 18px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(6px);
    color: #fff;
}

.music-controls.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* ===== Button Hover ===== */
button:hover {
    opacity: .85;
}

/* ===== Smooth gradient animation ===== */
.gradient {
    animation: gradientShift 12s linear infinite;
}

@keyframes gradientShift {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
}
</style>
</head>

<body>

<!-- ===== Video ===== -->
<video id="bg-video" autoplay muted loop playsinline>
    <source src="main.mp4" type="video/mp4">
</video>

<video id="extra-video" muted playsinline>
    <source src="0118.mp4" type="video/mp4">
</video>

<!-- ===== Audio ===== -->
<audio id="music">
    <source src="0115.mp3" type="audio/mpeg">
</audio>

<!-- ===== Particles ===== -->
<div id="particles-js"></div>

<!-- ===== Popup with stylish OK button ===== -->
<div class="popup" id="popup">
    <div class="popup-content">
        <button class="ok-button" onclick="startSyncExperience()">
            <span class="button-text">
                <span class="button-icon">▶</span>
                START
            </span>
        </button>
    </div>
</div>

<!-- ===== JS ===== -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
/* ===== Variables ===== */
const bgVideo     = document.getElementById('bg-video');
const mainVideo   = document.getElementById('extra-video');
const music       = document.getElementById('music');
const popup       = document.getElementById('popup');
const controls    = document.getElementById('controls');

let isPlaying = false;
let syncInterval = null;
let isFullscreenRequested = false;

/* ===== Start ===== */
function startSyncExperience() {
    // fade out effect for popup
    popup.style.opacity = '0';
    setTimeout(() => {
        popup.style.display = 'none';
    }, 500);

    // switch videos
    bgVideo.style.opacity = '0.3';
    mainVideo.style.opacity = '1';

    // play video and music
    mainVideo.play().catch(e => console.log('Video play error:', e));
    music.play().catch(e => console.log('Audio play error:', e));

    isPlaying = true;
    controls.classList.add('show');

    // start sync
    startSync();
}

/* ===== Sync Logic (optimized) ===== */
function startSync() {
    clearInterval(syncInterval);

    syncInterval = setInterval(() => {
        if (!isPlaying) return;

        const diff = Math.abs(mainVideo.currentTime - music.currentTime) * 1000;

        if (diff > 800) {
            music.currentTime = mainVideo.currentTime;
        }
    }, 250);
}

/* ===== Particles (optimized) ===== */
const isMobile = window.innerWidth < 768;

particlesJS("particles-js", {
    particles: {
        number: { value: isMobile ? 20 : 35 },
        color: { value: "#ffffff" },
        shape: { type: "circle" },
        opacity: { value: 0.5 },
        size: { value: 3 },
        line_linked: {
            enable: !isMobile,
            distance: 150,
            color: "#ffffff",
            opacity: 0.2,
            width: 1
        },
        move: {
            enable: true,
            speed: 1.2
        }
    },
    interactivity: {
        events: {
            onclick: { enable: false },
            resize: true
        }
    },
    retina_detect: true
});

/* ===== Page load effect ===== */
window.addEventListener('load', () => {
    // ensure popup shows smoothly
    setTimeout(() => {
        popup.style.opacity = '1';
    }, 100);
});
</script>

<script>
mainVideo.addEventListener('ended', () => {
    // reset both video and music
    mainVideo.currentTime = 0;
    music.currentTime = 0;

    // replay synced
    mainVideo.play().catch(()=>{});
    music.play().catch(()=>{});
});
</script>

</body>
</html>>
